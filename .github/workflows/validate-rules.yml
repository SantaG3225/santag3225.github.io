name: Validate Surge Rules

on:
  push:
    paths:
      - "rules/**/*.list"
      - "scripts/check-surge-rules.py"
      - ".github/workflows/validate-rules.yml"
  pull_request:
    paths:
      - "rules/**/*.list"
      - "scripts/check-surge-rules.py"
      - ".github/workflows/validate-rules.yml"
  workflow_dispatch:

jobs:
  validate:
    name: Check Surge rule format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate rules
        run: python scripts/check-surge-rules.py
